# nginx reverse proxy for docsign.cryptool.io -> Node on 127.0.0.1:4400
# Install:
#   sudo cp deploy/nginx-docsign.cryptool.io.conf /etc/nginx/sites-available/docsign.cryptool.io
#   sudo ln -s /etc/nginx/sites-available/docsign.cryptool.io /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d docsign.cryptool.io      # provisions the 443 block
#
# If fronted by Cloudflare, set SSL/TLS mode to "Full (strict)".

server {
    listen 80;
    listen [::]:80;
    server_name docsign.cryptool.io;

    # Allow reasonably large PDF uploads (multer caps at 30 MB).
    client_max_body_size 35m;

    location / {
        proxy_pass http://127.0.0.1:4400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # PDF stamping / certificate generation can take a moment on completion.
        proxy_read_timeout 120s;
    }
}
